spring:
  main:
    banner-mode: "off"
  # Redis configuration for tests
  data:
    redis:
      host: localhost
      port: 6379
      password: ""

management:
  health:
    defaults:
      enabled: false
    redis:
      enabled: false
    db:
      enabled: false
    livenessState:
      enabled: false
    readinessState:
      enabled: false
  endpoint:
    health:
      show-details: always
      probes:
        enabled: false

logging:
  level:
    com.openmeteo.mcp: INFO
    reactor.netty: WARN
    org.springframework: WARN

security:
  jwt:
    secret: "test-jwt-secret-key-that-is-definitely-64-characters-or-longer-xyz"
  api-key:
    header-name: X-API-Key

openmeteo:
  api:
    timeout-seconds: 10  # Shorter timeout for tests
  chat:
    enabled: false  # Disabled for unit/integration tests (requires AI provider keys)
